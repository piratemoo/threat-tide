name: update-vulns-json
on:
  workflow_dispatch:
  schedule:
    - cron: "7 2,13,19 * * *"

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out feed repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build live vuln feed
        env:
          GITHUB_TOKEN: "${{ github.token }}"
          EXTRA_RSS_SOURCES: "${{ secrets.EXTRA_RSS_SOURCES }}"
        run: python scripts/update_vulns.py

- name: Commit updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vulns.json
          git diff --cached --quiet && echo "No changes." || (git commit -m "Update Threat Tide live vuln feed" && git push)
          else
            git commit -m "Update Threat Tide live vuln feed"
            git push
          fi
