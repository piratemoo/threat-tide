name: Update Threat Tide live vuln feed

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is UTC. This targets about 8:07 AM, 2:07 PM, and 9:07 PM US Central during daylight time.
    # Non-zero minutes avoid the top-of-hour Actions queue, where scheduled workflows are more often delayed.
    - cron: "7 2,13,19 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out feed repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build live vuln feed
        env:
          GITHUB_TOKEN: ${{ github.token }}
          EXTRA_RSS_SOURCES: ${{ secrets.EXTRA_RSS_SOURCES }}
        run: python scripts/update_vulns.py

      - name: Commit updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vulns.json
          if git diff --cached --quiet; then
            echo "No feed changes to commit."
          else
            git commit -m "Update Threat Tide live vuln feed"
            git push
          fi
